<style>
:root{
  --ink:#0F1729; --ink2:#161F36; --gold:#F2B705; --gold-dim:#caa00a;
  --signal:#3B5BDB; --signal-dim:#e8edfd;
  --porcelain:#F7F8FA; --line:#E6E8EE; --line2:#EEF0F4;
  --ink-text:#1A1D29; --muted:#6B7280; --faint:#9AA1AE;
  --ok:#0E8F5C; --ok-bg:#E7F7EF; --warn:#B45309; --warn-bg:#FEF3E0; --danger:#C81E3A; --danger-bg:#FDECEF;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px;
  --shadow-sm:0 1px 2px rgba(15,23,41,.06);
  --shadow-md:0 4px 16px rgba(15,23,41,.08);
  --shadow-lg:0 16px 48px rgba(15,23,41,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--porcelain);color:var(--ink-text);font-size:14.5px;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit;font-size:14px}
:focus-visible{outline:2.5px solid var(--signal);outline-offset:1px}
.hidden{display:none!important}
.num,.mval,.qnum,.qnuminput,td b,.acstock{font-family:'JetBrains Mono',ui-monospace,monospace}

/* ── login ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;background:radial-gradient(circle at 20% 15%,#1c2A52 0%,var(--ink) 55%,#070B16 100%);position:relative;overflow:hidden}
.login-page::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(242,183,5,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(242,183,5,.05) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at 30% 20%,black,transparent 70%)}
.login-box{background:#fff;border-radius:var(--r-xl);padding:2.25rem;width:min(400px,100%);box-shadow:var(--shadow-lg);position:relative;z-index:1}
.login-logo{display:flex;align-items:center;gap:11px;margin-bottom:.5rem}
.login-logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--ink) 0%,#1c2A52 100%);border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:20px;box-shadow:var(--shadow-sm)}
.login-logo-name{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.login-sub{font-size:12.5px;color:var(--muted);margin-bottom:1.75rem;font-weight:500}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:var(--r-md);background:#fff;color:var(--ink-text);transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-dim)}
.err{font-size:12px;color:var(--danger);min-height:16px;margin-bottom:8px;font-weight:600}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r-md);border:1.5px solid var(--line);cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:var(--ink-text);white-space:nowrap;transition:all .12s}
.btn:hover{background:#F3F4F7;border-color:#D8DBE2}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btnp{background:var(--ink);color:#fff;border-color:var(--ink)}.btnp:hover{background:var(--ink2)}
.btns{background:var(--ok);color:#fff;border-color:var(--ok)}.btns:hover{background:#0a7049}
.btnd{background:var(--danger-bg);color:var(--danger);border-color:#F6C6CF}.btnd:hover{background:#fbdce2}
.btnsm{padding:6px 11px;font-size:12px}
.btnbl{width:100%;justify-content:center;padding:11px}

/* ── shell layout ── */
.app{min-height:100vh;display:grid;grid-template-columns:232px 1fr;grid-template-rows:60px 1fr}
.topbar{grid-column:1/3;background:var(--ink);color:#fff;padding:0 1.25rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.topbar-logo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.01em}
.topbar-date{font-size:11px;opacity:.55;font-weight:500}
.ubadge{background:rgba(255,255,255,.1);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600}
.obadge{background:var(--gold);color:var(--ink);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700}
.storebadge{background:rgba(242,183,5,.14);color:var(--gold);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(242,183,5,.3);display:inline-flex;align-items:center;gap:6px}
.storebadge:hover{background:rgba(242,183,5,.22)}
.livepulse{width:7px;height:7px;border-radius:50%;background:#34D399;box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:pulse 2s infinite;flex-shrink:0}
.livepulse.off{background:#9AA1AE;animation:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55)}70%{box-shadow:0 0 0 6px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
.logoutbtn{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:12px;font-weight:600}
.logoutbtn:hover{background:rgba(255,255,255,.18)}
.nav{grid-row:2;grid-column:1;background:#fff;border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:2px;position:sticky;top:60px;align-self:start;height:calc(100vh - 60px);overflow-y:auto}
.navbtn{padding:11px 13px;border:none;background:none;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--muted);border-radius:var(--r-md);text-align:left;display:flex;align-items:center;white-space:nowrap;transition:all .12s}
.navbtn.active{color:var(--ink);background:var(--signal-dim)}
.navbtn:hover:not(.active){color:var(--ink-text);background:var(--line2)}
.nbadge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto}
.content{grid-row:2;grid-column:2;padding:1.5rem;max-width:1040px;width:100%}

/* ── stat cards / metrics ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#fff;border-radius:var(--r-lg);padding:16px 18px;border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.mlabel{font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.mval{font-size:23px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.mval.warn{color:var(--warn)}.mval.ok{color:var(--ok)}.mval.danger{color:var(--danger)}

/* ── cards / tables ── */
.card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--line);padding:1.4rem;margin-bottom:1.1rem;box-shadow:var(--shadow-sm)}
.ctitle{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);margin-bottom:1.1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;letter-spacing:-.01em}
.twrap{overflow-x:auto;border-radius:var(--r-md)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:400px}
th{text-align:left;font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;border-bottom:1.5px solid var(--line);white-space:nowrap;background:#FAFBFC}
td{padding:10px 12px;border-bottom:1px solid var(--line2);color:var(--ink-text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFD}

/* ── badges ── */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.01em}
.bok{background:var(--ok-bg);color:var(--ok)}.bwarn{background:var(--warn-bg);color:var(--warn)}
.bdanger{background:var(--danger-bg);color:var(--danger)}.binfo{background:var(--signal-dim);color:var(--signal)}
.catbtn{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--signal-dim);color:var(--signal);border:1px dashed transparent;cursor:pointer}
.catbtn:hover{border-color:var(--signal)}
.catinput{font-size:12px;padding:4px 7px;width:150px;border:1.5px solid var(--signal);border-radius:6px}
.compbtn{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:#F4ECFD;color:#7E3FF2;border:1px dashed transparent;cursor:pointer}
.compbtn:hover{border-color:#7E3FF2}
.compinput{font-size:12px;padding:4px 7px;width:130px;border:1.5px solid #7E3FF2;border-radius:6px}

/* ── alerts / banners ── */
.alertbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r-md);margin-bottom:1.1rem;font-size:13px;font-weight:600}
.alertbar.warn{background:var(--warn-bg);color:#92400E;border:1px solid #F5D9A8}
.alertbar.danger{background:var(--danger-bg);color:#9F1239;border:1px solid #F3C0CC}

.srow{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.srow input,.srow select{padding:9px 13px;border:1.5px solid var(--line);border-radius:var(--r-md);background:#fff}
.srow input:focus,.srow select:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-dim)}
.srow input{flex:1;min-width:160px}
.overlay{position:fixed;inset:0;background:rgba(15,23,41,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:var(--r-xl);padding:1.6rem;width:min(500px,100%);box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
.mtitle{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:1.25rem;letter-spacing:-.01em}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.aclist{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--ink);border-radius:var(--r-md);max-height:220px;overflow-y:auto;z-index:100;box-shadow:var(--shadow-md)}
.acitem{padding:10px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line2)}
.acitem:last-child{border-bottom:none}
.acitem:hover{background:var(--signal-dim)}
.accat{font-size:11px;color:var(--faint);margin-top:1px}
.acstock{font-size:11px;font-weight:700}
.acstock.pos{color:var(--ok)}.acstock.neg{color:var(--danger)}
.cart-banner{background:linear-gradient(135deg,#FFF8E1,#FFF3D6);border:1.5px solid #F2D67E;border-radius:var(--r-md);padding:13px 17px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.cart-info{font-size:13px;font-weight:700;color:var(--warn)}
.cart-sub{font-size:12px;color:#92400E;margin-top:2px}
.itemrow{display:flex;gap:8px;align-items:center;margin-bottom:6px;padding:9px 11px;background:#FAFBFC;border-radius:var(--r-md);border:1px solid var(--line)}
.itemrow.matched{border-color:#BCE8D2;background:#F4FBF7}
.iname{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icat{font-size:11px;color:var(--faint)}
.qty-ctrl{display:flex;align-items:center;gap:4px;margin-left:8px;flex-shrink:0}
.qbtn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--ink);line-height:1}
.qbtn:hover{background:var(--signal-dim);border-color:var(--signal)}
.qnum{min-width:28px;text-align:center;font-size:14px;font-weight:600}
.qnuminput{width:54px;text-align:center;font-size:14px;font-weight:600;border:1.5px solid var(--line);border-radius:7px;padding:4px 2px;color:var(--ink)}

.rmbtn{background:var(--danger-bg);border:none;color:var(--danger);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0}
.hist-entry{border:1px solid var(--line);border-radius:var(--r-md);padding:14px;margin-bottom:10px}
.hist-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.hist-type{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:6px}

function G(id){return document.getElementById(id);}

// map DB row -> UI item shape
function rowToItem(r){return {id:r.id, name:r.name, cat:r.category||"", company:r.company||"", unit:r.unit||"Nos", qty:Number(r.qty)||0, min:Number(r.min_stock)||0, rate:Number(r.rate)||0};}

// ===== DATA LAYER (Supabase) =====
async function fetchStores(){
  var {data,error}=await sb.from("stores").select("*").order("name");
  if(error){console.error(error);return [];}
  return data||[];
}
async function fetchUsers(){
  var {data,error}=await sb.from("users").select("*").order("role").order("name");
  if(error){console.error(error);return [];}
  return (data||[]).map(function(r){return {id:r.id,name:r.name,role:r.role,pin:String(r.pin),canDelete:r.role==="owner"||!!r.can_delete};});
}
async function fetchItems(storeId){
  // Supabase caps each request at its configured max rows (often 1000),
  // so we page through in batches until a page comes back short.
  var pageSize=1000, from=0, all=[];
  while(true){
    var {data,error}=await sb.from("items").select("*").eq("store_id",storeId).order("name").range(from,from+pageSize-1);
    if(error){console.error(error);break;}
    if(!data||data.length===0)break;
    all=all.concat(data);
    if(data.length<pageSize)break; // last page
    from+=pageSize;
  }
  return all.map(rowToItem);
}
async function fetchHistory(storeId){
  var {data,error}=await sb.from("transactions").select("*, transaction_items(*)").eq("store_id",storeId).order("created_at",{ascending:false}).limit(300);
  if(error){console.error(error);return [];}
  return data.map(function(t){
    return {id:t.id,type:t.type,ref:t.ref||"—",supplier:t.supplier||"—",date:t.txn_date,by:t.by_user||"—",
      items:(t.transaction_items||[]).map(function(li){return{id:li.id,itemId:li.item_id,name:li.item_name,qty:Number(li.qty)};})};
  });
}
async function loadStoreData(storeId){
  ST.loading=true;render();
  var items=await fetchItems(storeId);
  var hist=await fetchHistory(storeId);
  ST.inv=items;ST.hist=hist;ST.loading=false;
  render();
}

async function dbAddItem(item){
  var {data,error}=await sb.from("items").insert({store_id:ST.storeId,name:item.name,category:item.cat,company:item.company||"",unit:item.unit,qty:item.qty,min_stock:item.min}).select().single();
  if(error){alert("Error adding item: "+error.message);return null;}
  return rowToItem(data);
}
async function dbUpdateItem(id,fields){
  var payload={updated_at:new Date().toISOString()};
  if(fields.name!==undefined)payload.name=fields.name;
  if(fields.cat!==undefined)payload.category=fields.cat;
  if(fields.company!==undefined)payload.company=fields.company;
  if(fields.unit!==undefined)payload.unit=fields.unit;
  if(fields.qty!==undefined)payload.qty=fields.qty;
  if(fields.min!==undefined)payload.min_stock=fields.min;
  var {error}=await sb.from("items").update(payload).eq("id",id);
  if(error){alert("Error updating item: "+error.message);return false;}
  return true;
}
async function dbDeleteItem(id){
  var {error}=await sb.from("items").delete().eq("id",id);
  if(error){alert("Error deleting item: "+error.message);return false;}
  return true;
}
async function dbRecordTransaction(type,meta,lines,extra){
  var payload0=Object.assign({store_id:ST.storeId,type:type,ref:meta.ref||null,supplier:meta.supplier||null,txn_date:meta.date,by_user:ST.user.name},extra||{});
  var {data:txn,error}=await sb.from("transactions").insert(payload0).select().single();
  if(error){alert("Error saving transaction: "+error.message);return false;}
  var payload=lines.map(function(l){return{transaction_id:txn.id,item_id:l.itemId,item_name:l.name,qty:l.qty};});
  var {error:e2}=await sb.from("transaction_items").insert(payload);
  if(e2){alert("Error saving line items: "+e2.message);return false;}
  for(var i=0;i<lines.length;i++){
    var l=lines[i],item=ST.inv.find(function(x){return x.id===l.itemId;});
    if(!item)continue;
    var newQty=type==="out"?item.qty-l.qty:item.qty+l.qty;
    await sb.from("items").update({qty:newQty,updated_at:new Date().toISOString()}).eq("id",l.itemId);
    item.qty=newQty;
  }
  return true;
}
// Deletes a transaction entirely and reverts its stock impact (e.g. a Sale
// that deducted 5 units gives those 5 back; a Stock IN that added 5 removes them).
async function dbDeleteTransaction(entry){
  for(var i=0;i<entry.items.length;i++){
    var l=entry.items[i],item=ST.inv.find(function(x){return x.id===l.itemId;});
    if(!item)continue;
    var newQty=entry.type==="out"?item.qty+l.qty:item.qty-l.qty;
    await sb.from("items").update({qty:newQty,updated_at:new Date().toISOString()}).eq("id",l.itemId);
    item.qty=newQty;
  }
  var {error:e1}=await sb.from("transaction_items").delete().eq("transaction_id",entry.id);
  if(e1){alert("Error deleting line items: "+e1.message);return false;}
  var {error:e2}=await sb.from("transactions").delete().eq("id",entry.id);
  if(e2){alert("Error deleting transaction: "+e2.message);return false;}
  return true;
}
// Applies edited line quantities for a transaction: adjusts stock by the
// difference between old and new qty for each line, removes lines set to 0,
// and deletes the whole transaction if every line ends up removed.
async function dbEditTransactionLines(entry,editedLines){
  for(var i=0;i<editedLines.length;i++){
    var el=editedLines[i];
    var item=ST.inv.find(function(x){return x.id===el.itemId;});
    var delta=el.newQty-el.oldQty; // positive = line qty increased
    if(item){
      var stockDelta=entry.type==="out"?-delta:delta;
      var newQty=item.qty+stockDelta;
      await sb.from("items").update({qty:newQty,updated_at:new Date().toISOString()}).eq("id",el.itemId);
      item.qty=newQty;
    }
    if(el.newQty<=0){
      await sb.from("transaction_items").delete().eq("id",el.lineId);
    }else{
      await sb.from("transaction_items").update({qty:el.newQty}).eq("id",el.lineId);
    }
  }
  var remaining=editedLines.filter(function(el){return el.newQty>0;});
  if(remaining.length===0){
    await sb.from("transactions").delete().eq("id",entry.id);
  }
  return true;
}

function bestMatch(name){
  if(!name)return null;
  var q=name.trim().toLowerCase();
  var m=ST.inv.find(function(i){return i.name.toLowerCase()===q;});if(m)return m;
  m=ST.inv.find(function(i){return q.length>5&&i.name.toLowerCase().includes(q);});if(m)return m;
  return null;
}

async function doLogin(){

// ── INVENTORY ──
function renderInv(tc){
  var isOwner=ST.user.role==="owner";
  var canEdit=true; // all logged-in staff can manage stock (add/edit items); delete is gated separately
  var focusInfo=null;
  var active=document.activeElement;
  if(active&&active.id==="invsearch")focusInfo={id:"invsearch",pos:active.selectionStart};
  var q=ST.invQ.toLowerCase(),cat=ST.invCat;
  var items=ST.inv.filter(function(i){return(!q||i.name.toLowerCase().includes(q)||(i.cat||"").toLowerCase().includes(q)||(i.company||"").toLowerCase().includes(q))&&(!cat||i.cat===cat);});
  var neg=ST.inv.filter(function(i){return i.qty<0;}).length;
  var low=ST.inv.filter(function(i){return i.min>0&&i.qty<=i.min;}).length;
  var cats=[...new Set(ST.inv.map(function(i){return i.cat||""}))].sort();
  var pageSize=ST.invPageSize;
  var totalPages=Math.max(1,Math.ceil(items.length/pageSize));
  if(ST.invPage>totalPages)ST.invPage=totalPages;
  if(ST.invPage<1)ST.invPage=1;
  var pageStart=(ST.invPage-1)*pageSize;
  var rows=items.slice(pageStart,pageStart+pageSize).map(function(i){
    var st=i.qty<0?"<span class='badge bdanger'>"+i.qty+"</span>":i.qty===0?"<span class='badge bwarn'>0</span>":"<b>"+i.qty+"</b>";
    var catCell=canEdit?"<button class='catbtn' data-id='"+i.id+"'>"+(esc(i.cat||"(none)"))+"</button>":"<span class='badge binfo' style='font-size:10px'>"+esc(i.cat||"")+"</span>";
    var compCell=canEdit?"<button class='compbtn' data-id='"+i.id+"'>"+(esc(i.company||"+ add"))+"</button>":esc(i.company||"—");
    return "<tr><td style='font-size:12px'>"+esc(i.name)+"</td><td class='catcell' data-id='"+i.id+"'>"+catCell+"</td><td class='compcell' data-id='"+i.id+"'>"+compCell+"</td><td>"+st+"</td><td style='color:#aaa;font-size:12px'>"+esc(i.unit||"Nos")+"</td>"+(canEdit?"<td><button class='btn btnsm editbtn' data-id='"+i.id+"'>Edit</button></td>":"")+"</tr>";
  }).join("");
  if(!rows)rows="<tr><td colspan='6' style='text-align:center;color:#aaa;padding:2rem'>No items found.</td></tr>";
  var catopts='<option value="">All categories</option>'+cats.map(function(c){return '<option value="'+esc(c)+'"'+(ST.invCat===c?" selected":"")+">"+esc(c)+"</option>";}).join("");
  var shownFrom=items.length?pageStart+1:0, shownTo=Math.min(pageStart+pageSize,items.length);
  var alertHtml="";
  if(neg>0||low>0){
    var parts=[];
    if(neg>0)parts.push(neg+" item(s) with negative stock");
    if(low>0)parts.push(low+" item(s) at or below minimum");
    alertHtml='<div class="alertbar '+(neg>0?"danger":"warn")+'">&#9888;&#65039; '+parts.join(" &middot; ")+' &mdash; review before next stock-in.</div>';
  }
  tc.innerHTML=alertHtml+'<div class="mgrid"><div class="metric"><div class="mlabel">Total Items</div><div class="mval">'+ST.inv.length.toLocaleString("en-IN")+'</div></div><div class="metric"><div class="mlabel">Negative</div><div class="mval '+(neg>0?"danger":"ok")+'">'+neg+'</div></div><div class="metric"><div class="mlabel">Low Stock</div><div class="mval '+(low>0?"warn":"ok")+'">'+low+'</div></div><div class="metric"><div class="mlabel">Shown</div><div class="mval">'+shownFrom+'&ndash;'+shownTo+' / '+items.length.toLocaleString("en-IN")+'</div></div></div>'
    +'<div class="card"><div class="ctitle"><span>Inventory &mdash; '+esc(ST.storeName)+'</span>'+(canEdit?"<button class='btn btnp btnsm' id='additembtn'>+ Add item</button>":"")+'</div>'
    +'<div class="srow"><input type="text" id="invsearch" placeholder="Search items..." value="'+esc(ST.invQ)+'"><select id="catsel" style="max-width:180px">'+catopts+'</select></div>'
    +(canEdit?'<div style="font-size:11px;color:#999;margin-bottom:6px">Tip: click a category or company to rename it, or type a new one to create it.</div>':"")
    +'<div class="twrap"><table><thead><tr><th>Item</th><th>Category</th><th>Company</th><th>Qty</th><th>Unit</th>'+(canEdit?"<th></th>":"")+'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 0"><button class="btn btnsm" id="prevpagebtn" '+(ST.invPage<=1?"disabled":"")+'>&larr; Prev</button><span style="font-size:13px;color:#666">Page '+ST.invPage+' of '+totalPages+'</span><button class="btn btnsm" id="nextpagebtn" '+(ST.invPage>=totalPages?"disabled":"")+'>Next &rarr;</button></div>'
    +'</div>';
  G("invsearch").oninput=function(){ST.invQ=this.value;ST.invPage=1;renderInv(tc);};
  G("catsel").onchange=function(){ST.invCat=this.value;ST.invPage=1;renderInv(tc);};
  G("prevpagebtn").onclick=function(){if(ST.invPage>1){ST.invPage--;renderInv(tc);}};
  G("nextpagebtn").onclick=function(){if(ST.invPage<totalPages){ST.invPage++;renderInv(tc);}};
  if(focusInfo){
    var el=G(focusInfo.id);
    if(el){el.focus();try{el.setSelectionRange(focusInfo.pos,focusInfo.pos);}catch(e){}}
  }
  if(canEdit){
    G("additembtn").onclick=openAdd;
    tc.querySelectorAll(".editbtn").forEach(function(btn){btn.onclick=function(){openEdit(this.dataset.id);};});
    tc.querySelectorAll(".catbtn").forEach(function(btn){btn.onclick=function(){startInlineEdit(this.closest("td"),this.dataset.id,"cat");};});
    tc.querySelectorAll(".compbtn").forEach(function(btn){btn.onclick=function(){startInlineEdit(this.closest("td"),this.dataset.id,"company");};});
  }
}

// click-to-edit category/company directly in the inventory table
function startInlineEdit(td,id,field){
  var item=ST.inv.find(function(i){return i.id===id;});
  if(!item)return;
  var isCat=field==="cat";
  var existing=isCat?[...new Set(ST.inv.map(function(i){return i.cat||""}))]:[...new Set(ST.inv.map(function(i){return i.company||""}))];
  existing=existing.filter(Boolean).sort();
  var dlid=(isCat?"catdl_":"compdl_")+id;
  var inputId=(isCat?"catinput_":"compinput_")+id;
  var startVal=item[field]||"";
  if(!isCat&&!startVal){var guess=guessCompany(item.name);if(guess)startVal=guess;}
  td.innerHTML='<input type="text" class="'+(isCat?"catinput":"compinput")+'" id="'+inputId+'" list="'+dlid+'" value="'+esc(startVal)+'" placeholder="'+(isCat?"Category":"Company / Brand")+'"><datalist id="'+dlid+'">'+existing.map(function(c){return '<option value="'+esc(c)+'">';}).join("")+'</datalist>';
  var inp=G(inputId);
  inp.focus();inp.select();
  var done=false;
  function finish(save){
    if(done)return;done=true;
    var val=(inp.value||"").trim();
    if(!save||val===(item[field]||"")){renderTab();return;}
    if(isCat&&!val){alert("Category can't be empty.");renderTab();return;}
    if(isCat){
      var exists=existing.some(function(c){return c.toLowerCase()===val.toLowerCase();});
      if(!exists&&!confirm('"'+val+'" doesn\'t exist as a category yet.\n\nCreate new category "'+val+'"?')){
        renderTab();return;
      }
    }
    var fields={};fields[field]=val;
    dbUpdateItem(id,fields).then(function(ok){
      if(ok)item[field]=val;
      renderTab();
    });
  }
  inp.onblur=function(){finish(true);};
  inp.onkeydown=function(e){
    if(e.key==="Enter"){inp.blur();}
    else if(e.key==="Escape"){finish(false);}
  };
}

// ── IMPORT ──
// Detects the brand/company from an item name — handles both items that
// name the brand directly (e.g. "HAVELLS LED BULB") and items where only a
// model code gives the brand away (e.g. "DX3 32A MCB" -> Legrand).
// Add more code -> brand lines below as you spot patterns in your inventory.
function guessCompany(name){
  var n=(name||"").toUpperCase();
  // Brand named directly
  if(/LEGRAND/.test(n))return"LEGRAND";
  if(/HAVELLS|^HAV[\.\s-]|\bHAV\b/.test(n))return"HAVELLS";
  if(/V[\s-]?GUARD/.test(n))return"V-GUARD";
  if(/NORTEK/.test(n))return"NORTEK";
  if(/SURYA/.test(n))return"SURYA";
  if(/POLYCAB|POLY\./.test(n))return"POLYCAB";
  if(/INDOASIAN|INDO\./.test(n))return"INDOASIAN";
  if(/BAJAJ/.test(n))return"BAJAJ";
  if(/ORIENT/.test(n))return"ORIENT";
  if(/\bUSHA\b/.test(n))return"USHA";
  if(/ATOMBERG/.test(n))return"ATOMBERG";
  if(/CROMPTON/.test(n))return"CROMPTON";
  if(/ANCHOR/.test(n))return"ANCHOR";
  if(/BENLO/.test(n))return"BENLO";
  if(/JUVAS/.test(n))return"JUVAS";
  if(/SISVO/.test(n))return"SISVO";
  if(/SHRINATH|SHREENATH/.test(n))return"SHREENATH";
  if(/PRESSFIT/.test(n))return"PRESSFIT";
  if(/\bCELLO\b/.test(n))return"CELLO";
  if(/BUTTERFL?Y/.test(n))return"BUTTERFLY";
  if(/KWALITY/.test(n))return"KWALITY";
  if(/SCHNEIDER/.test(n))return"SCHNEIDER";
  if(/GOLDMEDAL/.test(n))return"GOLDMEDAL";
  if(/BILLTECH/.test(n))return"BILLTECH";
  if(/FINOLEX/.test(n))return"FINOLEX";
  if(/\bCROWN\b/.test(n))return"CROWN";
  if(/MANGLAM|MANGALAM/.test(n))return"MANGALAM";
  if(/OPULUS/.test(n))return"OPULUS";
  // Model-code patterns — brand isn't written in the name, but the product
  // code is brand-specific. Add new lines here as you discover more codes.
  if(/\bDX3\b|DPX3|\bDXC\b/.test(n))return"LEGRAND";          // Legrand MCB/DB range
  if(/MYRIUS|ARTEOR|BRITZY|MYLINC|LYNCUS|ALLZY/.test(n))return"LEGRAND"; // Legrand switch ranges
  if(/\bMT8\b|\bMT9\b/.test(n))return"INDOASIAN";              // Indoasian MCB series
  return"";
}
function guessCategory(name){
  var n=(name||"").toUpperCase();
  // Legrand product lines (check specific lines before generic "LEGRAND")
  if(/MYRIUS/.test(n))return"LEGRAND MYRIUS";
  if(/ARTEOR/.test(n))return"LEGRAND ARTEOR";
  if(/BRITZY/.test(n))return"LEGRAND BRITZY";
  if(/MYLINC/.test(n))return"LEGRAND MYLINC";
  if(/LYNCUS/.test(n))return"LEGRAND LYNCUS";
  if(/ALLZY/.test(n))return"LEGRAND ALLZY";
  if(/\bDX3\b|DXC|DPX3/.test(n))return"LEGRAND DX3";
  if(/LEGRAND/.test(n))return"LEGRAND";
  // Havells
  if(/HAVELLS|^HAV[\.\s-]/.test(n)||/\bHAV\b/.test(n)){
    if(/FAN/.test(n))return"HAVELLS FAN";
    if(/LED|TUBE|BULB|PANEL|STRIP/.test(n))return"HAVELLS LED";
    if(/MCB|MCCB|RCCB|RCBO|ISO|DB BOX/.test(n))return"HAVELLS MCB";
    if(/WIRE|CABLE/.test(n))return"HAVELLS WIRE";
    return"HAVELLS";
  }
  // V-Guard
  if(/V[\s-]?GUARD/.test(n)){
    if(/WIRE|CABLE/.test(n))return"V-GUARD WIRE";
    if(/MCB|MCCB|RCCB|ISO/.test(n))return"V-GUARD MCB";
    return"V-GUARD";
  }
  // Nortek
  if(/NORTEK/.test(n)){
    if(/LED/.test(n))return"NORTEK LED";
    if(/WIRE/.test(n))return"NORTEK WIRE";
    return"NORTEK";
  }
  // Surya
  if(/SURYA/.test(n)){
    if(/LED/.test(n))return"SURYA LED";
    if(/WIRE/.test(n))return"SURYA WIRE";
    return"SURYA";
  }
  // Polycab
  if(/POLYCAB|POLY\./.test(n)){
    if(/MCB/.test(n))return"POLYCAB MCB";
    return"POLYCAB";
  }
  // Other named brands
  if(/INDOASIAN|INDO\./.test(n))return"INDOASIAN";
  if(/BAJAJ/.test(n))return"BAJAJ";
  if(/ORIENT/.test(n))return"ORIENT";
  if(/\bUSHA\b/.test(n))return"USHA";
  if(/ATOMBERG/.test(n))return"ATOMBERG";
  if(/CROMPTON/.test(n))return"CROMPTON";
  if(/ANCHOR/.test(n))return"ANCHOR";
  if(/BENLO/.test(n))return"BENLO";
  if(/JUVAS/.test(n))return"JUVAS";
  if(/SISVO/.test(n))return"SISVO";
  if(/SHRINATH|SHREENATH/.test(n))return"SHREENATH";
  if(/PRESSFIT/.test(n))return"PRESSFIT";
  if(/\bCELLO\b/.test(n))return"CELLO";
  if(/BUTTERFL?Y/.test(n))return"BUTTERFLY";
  if(/KWALITY/.test(n))return"KWALITY";
  if(/SCHNEIDER/.test(n))return"SCHNEIDER";
  if(/GOLDMEDAL/.test(n))return"GOLDMEDAL";
  if(/BILLTECH/.test(n))return"BILLTECH";
  if(/FINOLEX/.test(n))return"FINOLEX";
  if(/\bCROWN\b/.test(n))return"CROWN";
  if(/MANGLAM|MANGALAM/.test(n))return"MANGALAM";
  if(/OPULUS/.test(n))return"OPULUS";
  if(/BIG TALIA|BIG ITALIA/.test(n))return"POINTER";
  // Generic product types (no brand matched)
  if(/WIRE|CABLE/.test(n))return"WIRE";
  if(/\bFAN\b|EXHAUST|VENTIL/.test(n))return"FANS";
  if(/\bLED\b|TUBE LIGHT|BULB|PANEL LIGHT|STRIP LIGHT/.test(n))return"LED LIGHTS";
  if(/SWITCH|SOCKET|PLUG/.test(n))return"SWITCHES & SOCKETS";
  if(/\bMCB\b|MCCB|RCCB|RCBO|\bDB\b/.test(n))return"MCB & DB";
  if(/PIPE|CONDUIT/.test(n))return"CONDUIT & PIPE";
  if(/TRUNKING|DUCT/.test(n))return"TRUNKING & DUCT";
  if(/\bLUG\b|TERMINAL/.test(n))return"LUGS & TERMINALS";
  if(/CAPACITOR|FAN ROD|FAN REGULATOR/.test(n))return"FAN ACCESSORIES";
  if(/METER/.test(n))return"METER";

}

async function runSeed(){
  var status=G("seedstatus");
  status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Checking existing items...</div>';
  var seedEl=G("inv-seed");
  if(!seedEl){status.innerHTML='<div class="statusline serror">Seed data not found in this file.</div>';return;}
  var seed=JSON.parse(seedEl.textContent);
  // Build a name lookup of what's already in this store (case-insensitive) so we never insert a duplicate.
  var existingNames={};
  ST.inv.forEach(function(it){existingNames[(it.name||"").trim().toLowerCase()]=true;});
  var toInsert=seed.filter(function(r){return !existingNames[(r.name||"").trim().toLowerCase()];});
  var skipped=seed.length-toInsert.length;
  if(toInsert.length===0){
    status.innerHTML='<div class="statusline sok">&#10003; Nothing to do &mdash; all '+seed.length+' items already exist in '+esc(ST.storeName)+' (matched by name). 0 inserted.</div>';
    return;
  }
  if(!confirm(esc(ST.storeName)+" already has "+ST.inv.length+" items. "+skipped+" of the "+seed.length+" seed items already exist and will be skipped. Insert the remaining "+toInsert.length+" new item(s)?"))return;
  status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Loading items...</div>';
  var CHUNK=300,inserted=0;
  for(var i=0;i<toInsert.length;i+=CHUNK){
    var chunk=toInsert.slice(i,i+CHUNK).map(function(r){return{store_id:ST.storeId,name:r.name,category:r.cat,unit:r.unit,qty:r.qty,min_stock:r.min,rate:r.rate||0};});
    var res=await sb.from("items").insert(chunk);
    if(res.error){status.innerHTML='<div class="statusline serror">Error at item '+i+': '+esc(res.error.message)+'</div>';return;}
    inserted+=chunk.length;
    status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Loaded '+inserted+' / '+toInsert.length+'...</div>';
  }
  status.innerHTML='<div class="statusline sok">&#10003; Done! '+inserted+' new item(s) loaded, '+skipped+' skipped as duplicates, in '+esc(ST.storeName)+'.</div>';
  await loadStoreData(ST.storeId);
}
function handleImport(input){
  var file=input.files[0];if(!file)return;
  var status=G("impstatus");
  status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Reading file...</div>';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      if(typeof XLSX!=="undefined"){parseXLSX(data,status);}
      else{
        var script=document.createElement("script");
        script.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        script.onload=function(){parseXLSX(data,status);};
        script.onerror=function(){status.innerHTML='<div class="statusline serror">Failed to load parser. Check internet.</div>';};
        document.head.appendChild(script);
      }
    }catch(err){status.innerHTML='<div class="statusline serror">Error: '+esc(err.message)+'</div>';}
  };
  reader.readAsArrayBuffer(file);
}
async function parseXLSX(data,status){
  try{
    var wb=XLSX.read(data,{type:"array"});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    var skipWords=["ELECTRIC EMPORIUM","HAVELLS GALAXY","Contact","Stock Summary","Particulars","Closing","Quantity","Rate","Value","Apr","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
    var parsedRows=[];
    rows.forEach(function(row){
      var name=String(row[0]||"").trim();
      var qtyRaw=row[1];
      if(!name||qtyRaw===""||qtyRaw===null||qtyRaw===undefined)return;
      if(skipWords.some(function(s){return name.includes(s);}))return;
      var qty=parseFloat(String(qtyRaw).replace(/,/g,""));
      if(isNaN(qty))return;
      parsedRows.push({name:name,qty:Math.round(qty)});
    });
    if(!parsedRows.length){status.innerHTML='<div class="statusline serror">No valid rows found in this file.</div>';return;}
    status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Matching '+parsedRows.length+' rows against '+ST.storeName+'...</div>';
    var updated=0,added=0;
    for(var i=0;i<parsedRows.length;i++){
      var r=parsedRows[i];
      var existing=ST.inv.find(function(it){return it.name.toLowerCase()===r.name.toLowerCase();});
      if(existing){
        await sb.from("items").update({qty:r.qty,updated_at:new Date().toISOString()}).eq("id",existing.id);
        existing.qty=r.qty;updated++;
      }else{
        var {data:nd}=await sb.from("items").insert({store_id:ST.storeId,name:r.name,category:"IMPORTED",unit:"Nos",qty:r.qty,min_stock:0,rate:0}).select().single();
        if(nd)ST.inv.push(rowToItem(nd));
        added++;
      }
      if(i%50===0)status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Processed '+i+' / '+parsedRows.length+'...</div>';
    }
    status.innerHTML='<div class="statusline sok">&#10003; Done! '+updated+' updated, '+added+' new items added to '+esc(ST.storeName)+'.</div>';
  }catch(err){status.innerHTML='<div class="statusline serror">Parse error: '+esc(err.message)+'</div>';}
}

function findDuplicateGroups(){
  var groups={};
  ST.inv.forEach(function(i){
    var key=i.name.trim().toLowerCase().replace(/\s+/g," ");
    if(!groups[key])groups[key]=[];
    groups[key].push(i);
  });
  return Object.values(groups).filter(function(g){return g.length>1;});
}

  }).join("");
  tc.innerHTML='<div class="mgrid"><div class="metric"><div class="mlabel">Total Items</div><div class="mval">'+ST.inv.length.toLocaleString("en-IN")+'</div></div><div class="metric"><div class="mlabel">Sale Entries</div><div class="mval">'+outE+'</div></div><div class="metric"><div class="mlabel">Stock IN</div><div class="mval">'+inE+'</div></div><div class="metric"><div class="mlabel">Negative Stock</div><div class="mval danger">'+negItems.length+'</div></div></div><div class="card"><div class="ctitle">Items by category &mdash; '+esc(ST.storeName)+'</div>'+(bars||"<div style='color:#aaa;font-size:13px'>No items yet.</div>")+'</div>'
    +'<div class="card"><div class="ctitle"><span>Duplicate items ('+dupGroups.length+' group'+(dupGroups.length===1?"":"s")+')</span>'+(dupGroups.length?'<button class="btn btnsm btnd" id="mergeallbtn">Merge all duplicates</button>':"")+'</div>'+(dupGroups.length?'<div style="font-size:12px;color:#666;margin-bottom:10px">Items with the exact same name (ignoring case/spacing). Merging sums their quantities into one row and removes the rest. Showing '+Math.min(30,dupGroups.length)+' of '+dupGroups.length+'.</div>'+dupHtml:"<div style='color:#aaa;font-size:13px'>No duplicate names found.</div>")+'<div id="dupstatus"></div></div>'
    +(negItems.length?'<div class="card"><div class="ctitle">Negative stock ('+negItems.length+')</div><div class="twrap"><table><thead><tr><th>Item</th><th>Category</th><th>Qty</th></tr></thead><tbody>'+negRows+'</tbody></table></div></div>':"");
  if(dupGroups.length)G("mergeallbtn").onclick=mergeAllDuplicates;
}
async function mergeAllDuplicates(){
  var groups=findDuplicateGroups();
  if(!groups.length){alert("No duplicates found.");return;}
  if(!confirm("Merge "+groups.length+" duplicate group(s)? Quantities will be summed into one item per group, and the extra rows deleted. This cannot be undone."))return;
  var status=G("dupstatus");
  status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Merging...</div>';
  var merged=0;
  for(var g=0;g<groups.length;g++){
    var group=groups[g];
    var total=group.reduce(function(s,i){return s+i.qty;},0);
    var primary=group.find(function(i){return i.cat&&i.cat!=="IMPORTED";})||group[0];
    var others=group.filter(function(i){return i.id!==primary.id;});
    await dbUpdateItem(primary.id,{qty:total});
    for(var k=0;k<others.length;k++){await dbDeleteItem(others[k].id);}
    merged++;
    status.innerHTML='<div class="statusline sok"><span class="spinner"></span> Merged '+merged+' / '+groups.length+'...</div>';
  }
  status.innerHTML='<div class="statusline sok">&#10003; Done! Merged '+merged+' duplicate group(s).</div>';
  await loadStoreData(ST.storeId);
}

function closeML(){G("ml").innerHTML="";}

// ===== INIT =====
async function init(){
  G("app").innerHTML='<div class="loadwrap"><span class="spinner"></span> Connecting to Supabase...</div>';
  ST.stores=await fetchStores();
  ST.users=await fetchUsers();
  render();
}
init();

// Registration is best-effort: if served from file:// or without HTTPS, this
// silently no-ops and the app still works fine as a regular web page.
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
